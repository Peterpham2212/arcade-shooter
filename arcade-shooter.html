<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ARCADE SHOOTER</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: 'Courier New', monospace; }
  canvas { display: block; image-rendering: pixelated; cursor: none; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

const W = 800, H = 600;
canvas.width = W;
canvas.height = H;

// ─── Audio ───────────────────────────────────────────────────────────────────
const AC = new (window.AudioContext || window.webkitAudioContext)();
function beep(freq, dur, type='square', vol=0.15, decay=0.1) {
  const o = AC.createOscillator(), g = AC.createGain();
  o.connect(g); g.connect(AC.destination);
  o.type = type; o.frequency.setValueAtTime(freq, AC.currentTime);
  g.gain.setValueAtTime(vol, AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + dur);
  o.start(); o.stop(AC.currentTime + dur + decay);
}
function sfxShoot()   { beep(880, 0.05, 'square', 0.1); }
function sfxHit()     { beep(220, 0.08, 'sawtooth', 0.15); }
function sfxDie()     { beep(110, 0.3, 'sawtooth', 0.2); beep(80, 0.5, 'square', 0.1); }
function sfxLevel()   { [523,659,784,1046].forEach((f,i) => { const o=AC.createOscillator(),g=AC.createGain(); o.connect(g); g.connect(AC.destination); o.frequency.value=f; g.gain.setValueAtTime(0.15,AC.currentTime+i*0.1); g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+i*0.1+0.15); o.start(AC.currentTime+i*0.1); o.stop(AC.currentTime+i*0.1+0.2); }); }
function sfxPowerup() { [440,660,880].forEach((f,i) => { const o=AC.createOscillator(),g=AC.createGain(); o.connect(g); g.connect(AC.destination); o.frequency.value=f; g.gain.setValueAtTime(0.12,AC.currentTime+i*0.07); g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+i*0.07+0.1); o.start(AC.currentTime+i*0.07); o.stop(AC.currentTime+i*0.07+0.15); }); }
function sfxExplosion(){ beep(150,0.2,'sawtooth',0.25); beep(80,0.4,'square',0.1); }

// ─── Input ────────────────────────────────────────────────────────────────────
const keys = {};
const mouse = { x: W/2, y: H/2, held: false, clicked: false };
document.addEventListener('keydown', e => { keys[e.key] = true; });
document.addEventListener('keyup',   e => { keys[e.key] = false; });
canvas.addEventListener('mousemove', e => {
  const r = canvas.getBoundingClientRect();
  const scaleX = W / r.width, scaleY = H / r.height;
  mouse.x = (e.clientX - r.left) * scaleX;
  mouse.y = (e.clientY - r.top)  * scaleY;
});
canvas.addEventListener('mousedown', e => { if(e.button===0){ mouse.held=true; mouse.clicked=true; if(AC.state==='suspended') AC.resume(); } });
canvas.addEventListener('mouseup',   e => { if(e.button===0) mouse.held=false; });
document.addEventListener('keydown', e => { if(AC.state==='suspended') AC.resume(); });

// ─── Utilities ────────────────────────────────────────────────────────────────
function rand(a, b) { return a + Math.random() * (b - a); }
function randInt(a, b) { return Math.floor(rand(a, b+1)); }
function dist(a, b) { return Math.hypot(a.x - b.x, a.y - b.y); }
function angle(a, b) { return Math.atan2(b.y - a.y, b.x - a.x); }
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

// ─── Screen Shake ─────────────────────────────────────────────────────────────
let shakeAmt = 0;
function shake(amt) { shakeAmt = Math.max(shakeAmt, amt); }

// ─── Particles ────────────────────────────────────────────────────────────────
const particles = [];
function spawnParticles(x, y, color, count=8, speed=3) {
  for(let i=0; i<count; i++) {
    const a = rand(0, Math.PI*2);
    const s = rand(0.5, speed);
    particles.push({ x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s, life: 1, color, size: rand(2,5) });
  }
}
function updateParticles() {
  for(let i=particles.length-1; i>=0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.vx *= 0.92; p.vy *= 0.92;
    p.life -= 0.035;
    if(p.life <= 0) particles.splice(i,1);
  }
}
function drawParticles() {
  for(const p of particles) {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
  }
  ctx.globalAlpha = 1;
}

// ─── Floating Text ────────────────────────────────────────────────────────────
const floats = [];
function spawnFloat(x, y, text, color='#fff') {
  floats.push({ x, y, text, color, life: 1, vy: -1.2 });
}
function updateFloats() {
  for(let i=floats.length-1; i>=0; i--) {
    floats[i].y += floats[i].vy;
    floats[i].life -= 0.02;
    if(floats[i].life <= 0) floats.splice(i,1);
  }
}
function drawFloats() {
  for(const f of floats) {
    ctx.globalAlpha = f.life;
    ctx.fillStyle = f.color;
    ctx.font = 'bold 14px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText(f.text, f.x, f.y);
  }
  ctx.globalAlpha = 1;
}

// ─── Bullets ──────────────────────────────────────────────────────────────────
const bullets = [];
const enemyBullets = [];

// ─── Power-up drops ──────────────────────────────────────────────────────────
const drops = [];
const DROP_TYPES = ['hp','firerate','spread'];
const DROP_COLORS = { hp:'#f55', firerate:'#ff0', spread:'#0ff' };
const DROP_LABELS  = { hp:'+HP', firerate:'FAST', spread:'SPREAD' };

function spawnDrop(x, y) {
  if(Math.random() > 0.35) return; // 35% drop chance
  const type = DROP_TYPES[randInt(0, DROP_TYPES.length-1)];
  drops.push({ x, y, type, life: 600, bob: 0 });
}

function updateDrops() {
  for(let i=drops.length-1; i>=0; i--) {
    const d = drops[i];
    d.bob += 0.08;
    d.life--;
    if(d.life <= 0) { drops.splice(i,1); continue; }
    if(dist(d, player) < 18) {
      applyDrop(d.type);
      sfxPowerup();
      spawnFloat(d.x, d.y-10, DROP_LABELS[d.type], DROP_COLORS[d.type]);
      drops.splice(i,1);
    }
  }
}

function drawDrops() {
  for(const d of drops) {
    const bobY = Math.sin(d.bob) * 4;
    const c = DROP_COLORS[d.type];
    const alpha = d.life < 120 ? d.life/120 : 1;
    ctx.globalAlpha = alpha;
    ctx.strokeStyle = c;
    ctx.lineWidth = 2;
    ctx.strokeRect(d.x-8, d.y-8+bobY, 16, 16);
    ctx.fillStyle = c + '44';
    ctx.fillRect(d.x-8, d.y-8+bobY, 16, 16);
    ctx.fillStyle = c;
    ctx.font = '8px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText(DROP_LABELS[d.type], d.x, d.y+3+bobY);
  }
  ctx.globalAlpha = 1;
}

function applyDrop(type) {
  if(type === 'hp')       { player.hp = Math.min(player.maxHp, player.hp + 30); }
  if(type === 'firerate') { player.fireRateBonus = Math.max(player.fireRateBonus - 4, 2); }
  if(type === 'spread')   { player.spreadShot = Math.min(player.spreadShot + 1, 3); }
}

// ─── Level Definitions ────────────────────────────────────────────────────────
const LEVEL_DEFS = [
  { wave:1,  walkers:8,  flankers:0,  tanks:0,  shooters:0 },
  { wave:2,  walkers:12, flankers:0,  tanks:0,  shooters:0 },
  { wave:3,  walkers:10, flankers:4,  tanks:0,  shooters:0 },
  { wave:4,  walkers:10, flankers:5,  tanks:0,  shooters:2 },
  { wave:5,  walkers:12, flankers:6,  tanks:3,  shooters:3 },
];

// ─── Player ───────────────────────────────────────────────────────────────────
const player = {
  x: W/2, y: H/2,
  r: 12,
  speed: 3.2,
  hp: 120, maxHp: 120,
  invincible: 0,
  aimAngle: 0,
  fireCooldown: 0,
  fireRate: 14,
  fireRateBonus: 0,
  spreadShot: 0,
  walkFrame: 0, walkTimer: 0,
  score: 0,
  dead: false,
};

function resetPlayer() {
  player.x = W/2; player.y = H/2;
  player.hp = player.maxHp;
  player.invincible = 0;
  player.fireCooldown = 0;
  player.fireRateBonus = 0;
  player.spreadShot = 0;
  player.walkFrame = 0; player.walkTimer = 0;
}

function drawPlayer() {
  const { x, y, aimAngle, invincible, walkFrame } = player;
  if(invincible > 0 && Math.floor(invincible/4)%2===0) return;

  ctx.save();
  ctx.translate(x, y);

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath(); ctx.ellipse(2, 6, 10, 5, 0, 0, Math.PI*2); ctx.fill();

  // Legs (walking animation)
  const legOffset = [0,3,0,-3][walkFrame % 4];
  ctx.fillStyle = '#2a2';
  ctx.fillRect(-5, 6, 4, 7 + legOffset);
  ctx.fillRect(1,  6, 4, 7 - legOffset);

  // Body
  ctx.fillStyle = '#4f4';
  ctx.fillRect(-8, -8, 16, 16);
  // Body highlight
  ctx.fillStyle = '#6f6';
  ctx.fillRect(-6, -6, 6, 5);
  // Body dark
  ctx.fillStyle = '#2a2';
  ctx.fillRect(2, 2, 5, 5);

  // Head
  ctx.fillStyle = '#4f4';
  ctx.fillRect(-5, -14, 10, 10);
  ctx.fillStyle = '#6f6';
  ctx.fillRect(-4, -13, 4, 4);
  // Eyes
  ctx.fillStyle = '#000';
  ctx.fillRect(-3, -11, 2, 2);
  ctx.fillRect(1,  -11, 2, 2);

  // Gun arm (rotates toward mouse)
  ctx.rotate(aimAngle);
  ctx.fillStyle = '#888';
  ctx.fillRect(4, -3, 14, 5);
  ctx.fillStyle = '#aaa';
  ctx.fillRect(4, -2, 12, 3);
  // Muzzle
  ctx.fillStyle = '#555';
  ctx.fillRect(16, -4, 4, 7);

  ctx.restore();
}

function updatePlayer() {
  if(player.dead) return;

  // Movement
  let dx=0, dy=0;
  if(keys['ArrowLeft']  || keys['a']) dx -= 1;
  if(keys['ArrowRight'] || keys['d']) dx += 1;
  if(keys['ArrowUp']    || keys['w']) dy -= 1;
  if(keys['ArrowDown']  || keys['s']) dy += 1;
  if(dx!==0 && dy!==0) { dx*=0.707; dy*=0.707; }

  player.x = clamp(player.x + dx*player.speed, player.r, W-player.r);
  player.y = clamp(player.y + dy*player.speed, player.r, H-player.r);

  if(dx!==0 || dy!==0) {
    player.walkTimer++;
    if(player.walkTimer > 6) { player.walkTimer=0; player.walkFrame=(player.walkFrame+1)%4; }
  }

  // Aim
  player.aimAngle = angle(player, mouse);

  // Fire
  const effectiveFireRate = Math.max(player.fireRate - player.fireRateBonus, 3);
  if(player.fireCooldown > 0) player.fireCooldown--;

  const wantFire = mouse.held || mouse.clicked;
  mouse.clicked = false;

  if(wantFire && player.fireCooldown === 0) {
    firePlayerBullet();
    player.fireCooldown = mouse.held ? effectiveFireRate : Math.floor(effectiveFireRate * 0.7);
  }

  if(player.invincible > 0) player.invincible--;
}

function firePlayerBullet() {
  const angles = [player.aimAngle];
  if(player.spreadShot >= 1) { angles.push(player.aimAngle - 0.2, player.aimAngle + 0.2); }
  if(player.spreadShot >= 2) { angles.push(player.aimAngle - 0.38, player.aimAngle + 0.38); }
  if(player.spreadShot >= 3) { angles.push(player.aimAngle - 0.55, player.aimAngle + 0.55); }
  for(const a of angles) {
    bullets.push({ x: player.x + Math.cos(a)*18, y: player.y + Math.sin(a)*18, vx: Math.cos(a)*11, vy: Math.sin(a)*11, life: 60, trail: [] });
  }
  sfxShoot();
}

// ─── Enemies ──────────────────────────────────────────────────────────────────
const enemies = [];

const ENEMY_DEFS = {
  walker:  { r:10, hp:2,  speed:1.2, color:'#f44', darkColor:'#a00', score:10, label:'W' },
  flanker: { r:9,  hp:3,  speed:1.6, color:'#fa0', darkColor:'#a60', score:20, label:'F' },
  tank:    { r:16, hp:10, speed:0.6, color:'#a4f', darkColor:'#60a', score:50, label:'T' },
  shooter: { r:10, hp:3,  speed:0.8, color:'#f4a', darkColor:'#a06', score:30, label:'S' },
};

function spawnEnemy(type) {
  const def = ENEMY_DEFS[type];
  const side = randInt(0,3);
  let x, y;
  if(side===0) { x=rand(0,W); y=-20; }
  else if(side===1) { x=W+20; y=rand(0,H); }
  else if(side===2) { x=rand(0,W); y=H+20; }
  else { x=-20; y=rand(0,H); }

  const offset = type==='flanker' ? rand(-1.2,1.2) : 0;
  enemies.push({
    x, y, type, r: def.r, hp: def.hp, maxHp: def.hp,
    speed: def.speed, color: def.color, darkColor: def.darkColor,
    score: def.score,
    offset,
    shootTimer: type==='shooter' ? randInt(60,120) : 9999,
    walkFrame: 0, walkTimer: 0,
    hitFlash: 0,
  });
}

function spawnWave(levelDef) {
  enemies.length = 0;
  for(let i=0; i<levelDef.walkers;  i++) spawnEnemy('walker');
  for(let i=0; i<levelDef.flankers; i++) spawnEnemy('flanker');
  for(let i=0; i<levelDef.tanks;    i++) spawnEnemy('tank');
  for(let i=0; i<levelDef.shooters; i++) spawnEnemy('shooter');
}

function updateEnemies(dt) {
  for(let i=enemies.length-1; i>=0; i--) {
    const e = enemies[i];
    if(e.hitFlash > 0) e.hitFlash--;

    // Movement toward player
    const a = angle(e, player);
    let moveAngle = a;
    if(e.type === 'flanker') moveAngle = a + e.offset * (1 - dist(e,player)/300);

    e.x += Math.cos(moveAngle) * e.speed;
    e.y += Math.sin(moveAngle) * e.speed;

    e.walkTimer++;
    if(e.walkTimer > 8) { e.walkTimer=0; e.walkFrame=(e.walkFrame+1)%4; }

    // Shooter fires
    if(e.type === 'shooter') {
      e.shootTimer--;
      if(e.shootTimer <= 0) {
        e.shootTimer = randInt(80,160);
        const sa = angle(e, player) + rand(-0.15,0.15);
        enemyBullets.push({ x:e.x, y:e.y, vx:Math.cos(sa)*4, vy:Math.sin(sa)*4, life:120 });
      }
    }

    // Touch player
    if(dist(e, player) < e.r + player.r && player.invincible===0 && !player.dead) {
      player.hp -= e.type==='tank' ? 18 : 10;
      player.invincible = 50;
      shake(6);
      sfxHit();
      if(player.hp <= 0) { player.dead=true; sfxDie(); }
    }
  }
}

function drawEnemy(e) {
  const { x, y, r, type, color, darkColor, hp, maxHp, hitFlash, walkFrame } = e;
  const flash = hitFlash > 0;

  ctx.save();
  ctx.translate(x, y);

  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.25)';
  ctx.beginPath(); ctx.ellipse(2, r+2, r*0.9, r*0.4, 0, 0, Math.PI*2); ctx.fill();

  if(type === 'tank') {
    // Tank body
    ctx.fillStyle = flash ? '#fff' : darkColor;
    ctx.fillRect(-r, -r, r*2, r*2);
    ctx.fillStyle = flash ? '#fff' : color;
    ctx.fillRect(-r+3, -r+3, r*2-6, r*2-6);
    // Turret
    const ta = angle(e, player);
    ctx.rotate(ta);
    ctx.fillStyle = '#888';
    ctx.fillRect(0, -4, r+4, 8);
    ctx.fillStyle = '#555';
    ctx.fillRect(r, -3, 6, 6);
  } else if(type === 'flanker') {
    // Diamond shape
    ctx.fillStyle = flash ? '#fff' : darkColor;
    ctx.beginPath(); ctx.moveTo(0,-r); ctx.lineTo(r,0); ctx.lineTo(0,r); ctx.lineTo(-r,0); ctx.closePath(); ctx.fill();
    ctx.fillStyle = flash ? '#fff' : color;
    ctx.beginPath(); ctx.moveTo(0,-r+3); ctx.lineTo(r-3,0); ctx.lineTo(0,r-3); ctx.lineTo(-r+3,0); ctx.closePath(); ctx.fill();
    // Eyes
    const ea = angle(e, player);
    ctx.rotate(ea);
    ctx.fillStyle = '#000';
    ctx.fillRect(2,-3,3,3);
    ctx.fillStyle = '#ff0';
    ctx.fillRect(3,-2,2,2);
  } else if(type === 'shooter') {
    // Crosshair-like
    ctx.fillStyle = flash ? '#fff' : darkColor;
    ctx.fillRect(-r, -4, r*2, 8);
    ctx.fillRect(-4, -r, 8, r*2);
    ctx.fillStyle = flash ? '#fff' : color;
    ctx.beginPath(); ctx.arc(0,0,r-3,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = flash ? '#fff' : darkColor;
    ctx.beginPath(); ctx.arc(0,0,3,0,Math.PI*2); ctx.fill();
  } else {
    // Walker — simple box creature
    const legO = [0,2,0,-2][walkFrame % 4];
    ctx.fillStyle = flash ? '#fff' : darkColor;
    ctx.fillRect(-5, r-2, 4, 5+legO);
    ctx.fillRect(1,  r-2, 4, 5-legO);
    ctx.fillStyle = flash ? '#fff' : color;
    ctx.fillRect(-r, -r, r*2, r*2);
    ctx.fillStyle = flash ? '#fff' : darkColor;
    ctx.fillRect(-r+2, -r+2, r-2, r-2); // shading
    ctx.fillStyle = '#000';
    ctx.fillRect(-5,-3,3,3);
    ctx.fillRect(2, -3,3,3);
    ctx.fillStyle = '#f00';
    ctx.fillRect(-4,-2,2,2);
    ctx.fillRect(3, -2,2,2);
  }

  ctx.restore();

  // HP bar (only if damaged)
  if(hp < maxHp) {
    const bw = r*2+4;
    ctx.fillStyle='#333';
    ctx.fillRect(x-bw/2, y-r-10, bw, 4);
    ctx.fillStyle = hp/maxHp > 0.5 ? '#4f4' : hp/maxHp > 0.25 ? '#ff4' : '#f44';
    ctx.fillRect(x-bw/2, y-r-10, bw*(hp/maxHp), 4);
  }
}

// ─── Bullets Update ───────────────────────────────────────────────────────────
function updateBullets() {
  // Player bullets
  for(let i=bullets.length-1; i>=0; i--) {
    const b = bullets[i];
    b.trail.push({x:b.x, y:b.y});
    if(b.trail.length > 5) b.trail.shift();
    b.x += b.vx; b.y += b.vy; b.life--;
    if(b.life<=0 || b.x<0||b.x>W||b.y<0||b.y>H) { bullets.splice(i,1); continue; }

    let hit = false;
    for(let j=enemies.length-1; j>=0; j--) {
      const e = enemies[j];
      if(dist(b, e) < e.r + 5) {
        e.hp--;
        e.hitFlash = 6;
        sfxHit();
        spawnParticles(b.x, b.y, e.color, 4, 2);
        bullets.splice(i,1);
        hit = true;
        if(e.hp <= 0) {
          player.score += e.score;
          spawnFloat(e.x, e.y-10, '+'+e.score, '#ff0');
          spawnParticles(e.x, e.y, e.color, 16, 4);
          shake(4);
          sfxExplosion();
          spawnDrop(e.x, e.y);
          enemies.splice(j,1);
        }
        break;
      }
    }
    if(hit) continue;
  }

  // Enemy bullets
  for(let i=enemyBullets.length-1; i>=0; i--) {
    const b = enemyBullets[i];
    b.x += b.vx; b.y += b.vy; b.life--;
    if(b.life<=0||b.x<0||b.x>W||b.y<0||b.y>H) { enemyBullets.splice(i,1); continue; }
    if(dist(b,player)<player.r && player.invincible===0 && !player.dead) {
      player.hp -= 8;
      player.invincible = 40;
      shake(4);
      sfxHit();
      spawnParticles(b.x, b.y, '#f4a', 5, 2);
      enemyBullets.splice(i,1);
      if(player.hp<=0) { player.dead=true; sfxDie(); }
    }
  }
}

function drawBullets() {
  // Player bullets — green with trail
  for(const b of bullets) {
    for(let t=0; t<b.trail.length; t++) {
      const alpha = (t/b.trail.length) * 0.5;
      ctx.globalAlpha = alpha;
      ctx.fillStyle = '#0ff';
      ctx.fillRect(b.trail[t].x-2, b.trail[t].y-2, 4, 4);
    }
    ctx.globalAlpha = 1;
    ctx.fillStyle = '#fff';
    ctx.fillRect(b.x-3, b.y-3, 6, 6);
    ctx.fillStyle = '#0ff';
    ctx.fillRect(b.x-2, b.y-2, 4, 4);
  }
  ctx.globalAlpha = 1;

  // Enemy bullets — pink
  for(const b of enemyBullets) {
    ctx.fillStyle = '#f4a';
    ctx.beginPath(); ctx.arc(b.x, b.y, 4, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(b.x, b.y, 2, 0, Math.PI*2); ctx.fill();
  }
}

// ─── Background ───────────────────────────────────────────────────────────────
function drawBackground() {
  // Checkerboard floor
  const ts = 40;
  for(let gx=0; gx<W/ts+1; gx++) {
    for(let gy=0; gy<H/ts+1; gy++) {
      ctx.fillStyle = (gx+gy)%2===0 ? '#111' : '#0d0d0d';
      ctx.fillRect(gx*ts, gy*ts, ts, ts);
    }
  }
  // Grid lines
  ctx.strokeStyle = '#1a1a1a';
  ctx.lineWidth = 1;
  for(let gx=0; gx<=W/ts; gx++) { ctx.beginPath(); ctx.moveTo(gx*ts,0); ctx.lineTo(gx*ts,H); ctx.stroke(); }
  for(let gy=0; gy<=H/ts; gy++) { ctx.beginPath(); ctx.moveTo(0,gy*ts); ctx.lineTo(W,gy*ts); ctx.stroke(); }
  // Arena border
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 3;
  ctx.strokeRect(3,3,W-6,H-6);
  ctx.strokeStyle = '#222';
  ctx.lineWidth = 1;
  ctx.strokeRect(8,8,W-16,H-16);
}

// ─── HUD ──────────────────────────────────────────────────────────────────────
function drawHUD() {
  // HP Bar
  const hpW = 160;
  ctx.fillStyle = '#111';
  ctx.fillRect(16, 16, hpW, 16);
  ctx.fillStyle = player.hp/player.maxHp > 0.5 ? '#4f4' : player.hp/player.maxHp > 0.25 ? '#ff0' : '#f44';
  ctx.fillRect(16, 16, hpW*(player.hp/player.maxHp), 16);
  ctx.strokeStyle = '#555';
  ctx.lineWidth = 1;
  ctx.strokeRect(16, 16, hpW, 16);
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 11px Courier New';
  ctx.textAlign = 'left';
  ctx.fillText('HP  ' + Math.max(0,player.hp) + '/' + player.maxHp, 20, 28);

  // Score
  ctx.fillStyle = '#ff0';
  ctx.font = 'bold 18px Courier New';
  ctx.textAlign = 'right';
  ctx.fillText(String(player.score).padStart(6,'0'), W-16, 32);

  // Level
  ctx.fillStyle = '#0ff';
  ctx.font = 'bold 13px Courier New';
  ctx.textAlign = 'center';
  ctx.fillText('LEVEL ' + currentLevel, W/2, 28);

  // Enemies left
  ctx.fillStyle = '#888';
  ctx.font = '11px Courier New';
  ctx.fillText(enemies.length + ' ENEMIES', W/2, 44);

  // Power-up icons
  let px = 16;
  if(player.spreadShot>0) {
    ctx.fillStyle='#0ff';
    ctx.font='10px Courier New';
    ctx.textAlign='left';
    ctx.fillText('SPREAD x'+player.spreadShot, px, 50);
    px += 80;
  }
  if(player.fireRateBonus>0) {
    ctx.fillStyle='#ff0';
    ctx.font='10px Courier New';
    ctx.textAlign='left';
    ctx.fillText('FAST x'+player.fireRateBonus, px, 50);
  }

  // Crosshair
  const cx=mouse.x, cy=mouse.y;
  ctx.strokeStyle='#0f0';
  ctx.lineWidth=1.5;
  ctx.beginPath();
  ctx.moveTo(cx-12,cy); ctx.lineTo(cx-4,cy);
  ctx.moveTo(cx+4,cy);  ctx.lineTo(cx+12,cy);
  ctx.moveTo(cx,cy-12); ctx.lineTo(cx,cy-4);
  ctx.moveTo(cx,cy+4);  ctx.lineTo(cx,cy+12);
  ctx.stroke();
  ctx.strokeStyle='rgba(0,255,0,0.4)';
  ctx.lineWidth=1;
  ctx.beginPath(); ctx.arc(cx,cy,8,0,Math.PI*2); ctx.stroke();

  // CRT scanlines
  ctx.fillStyle='rgba(0,0,0,0.04)';
  for(let sy=0; sy<H; sy+=3) ctx.fillRect(0,sy,W,1);
}

// ─── Overlay Screens ─────────────────────────────────────────────────────────
function drawLevelClear() {
  ctx.fillStyle='rgba(0,0,0,0.7)';
  ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#0ff';
  ctx.font='bold 48px Courier New';
  ctx.textAlign='center';
  ctx.fillText('WAVE CLEAR!', W/2, H/2-60);
  ctx.fillStyle='#ff0';
  ctx.font='bold 22px Courier New';
  ctx.fillText('SCORE: ' + player.score, W/2, H/2-10);
  ctx.fillStyle='#4f4';
  ctx.font='16px Courier New';
  if(currentLevel < LEVEL_DEFS.length) {
    ctx.fillText('NEXT WAVE IN ' + Math.ceil(transitionTimer/60) + 's...', W/2, H/2+40);
    ctx.fillStyle='#888';
    ctx.font='13px Courier New';
    ctx.fillText('PICK UP POWER-UPS THAT DROPPED!', W/2, H/2+70);
  } else {
    ctx.fillStyle='#0ff';
    ctx.font='bold 28px Courier New';
    ctx.fillText('YOU WIN! LEGENDARY!', W/2, H/2+40);
    ctx.fillStyle='#888';
    ctx.font='14px Courier New';
    ctx.fillText('PRESS R TO PLAY AGAIN', W/2, H/2+80);
  }
}

function drawGameOver() {
  ctx.fillStyle='rgba(0,0,0,0.8)';
  ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#f44';
  ctx.font='bold 56px Courier New';
  ctx.textAlign='center';
  ctx.fillText('GAME OVER', W/2, H/2-50);
  ctx.fillStyle='#ff0';
  ctx.font='bold 24px Courier New';
  ctx.fillText('SCORE: ' + player.score, W/2, H/2+10);
  ctx.fillStyle='#888';
  ctx.font='16px Courier New';
  ctx.fillText('PRESS R TO RETRY', W/2, H/2+60);
}

function drawStartScreen() {
  ctx.fillStyle='#000';
  ctx.fillRect(0,0,W,H);
  // Grid bg
  ctx.strokeStyle='#1a1a1a'; ctx.lineWidth=1;
  for(let gx=0;gx<=W/40;gx++){ctx.beginPath();ctx.moveTo(gx*40,0);ctx.lineTo(gx*40,H);ctx.stroke();}
  for(let gy=0;gy<=H/40;gy++){ctx.beginPath();ctx.moveTo(0,gy*40);ctx.lineTo(W,gy*40);ctx.stroke();}
  // Title
  const pulse = 0.7 + 0.3*Math.sin(Date.now()/400);
  ctx.globalAlpha = pulse;
  ctx.fillStyle='#0ff';
  ctx.font='bold 64px Courier New';
  ctx.textAlign='center';
  ctx.fillText('ARCADE', W/2, H/2-80);
  ctx.fillStyle='#4f4';
  ctx.fillText('SHOOTER', W/2, H/2-10);
  ctx.globalAlpha = 1;
  ctx.fillStyle='#ff0';
  ctx.font='bold 18px Courier New';
  ctx.fillText('CLICK OR PRESS ANY KEY TO START', W/2, H/2+70);
  ctx.fillStyle='#888';
  ctx.font='13px Courier New';
  ctx.fillText('ARROW KEYS: MOVE   MOUSE: AIM   CLICK: SHOOT', W/2, H/2+110);
  ctx.fillText('HOLD: AUTO-FIRE   CLICK: SINGLE SHOT', W/2, H/2+132);
  ctx.fillStyle='#444';
  ctx.font='11px Courier New';
  ctx.fillText('5 WAVES — SURVIVE THEM ALL', W/2, H/2+160);
}

// ─── Game State ───────────────────────────────────────────────────────────────
let gameState = 'start'; // start | playing | levelclear | gameover | win
let currentLevel = 1;
let transitionTimer = 0;
const TRANSITION_DURATION = 240; // 4 seconds to pick up drops

function startGame() {
  player.score = 0;
  currentLevel = 1;
  resetPlayer();
  bullets.length = 0;
  enemyBullets.length = 0;
  drops.length = 0;
  particles.length = 0;
  floats.length = 0;
  spawnWave(LEVEL_DEFS[0]);
  gameState = 'playing';
}

function nextLevel() {
  currentLevel++;
  bullets.length = 0;
  enemyBullets.length = 0;
  // Keep drops
  spawnWave(LEVEL_DEFS[currentLevel-1]);
  sfxLevel();
  gameState = 'playing';
}

// ─── Main Loop ────────────────────────────────────────────────────────────────
let last = 0;
function loop(ts) {
  requestAnimationFrame(loop);
  const dt = Math.min((ts - last) / 16.67, 3);
  last = ts;

  // Screen shake
  let sx=0, sy=0;
  if(shakeAmt > 0) { sx=rand(-shakeAmt,shakeAmt); sy=rand(-shakeAmt,shakeAmt); shakeAmt*=0.85; if(shakeAmt<0.3) shakeAmt=0; }
  ctx.save();
  ctx.translate(sx, sy);

  if(gameState === 'start') {
    drawStartScreen();
    if(mouse.clicked || Object.keys(keys).some(k=>keys[k])) {
      mouse.clicked=false;
      startGame();
    }
  }
  else if(gameState === 'playing') {
    drawBackground();
    updatePlayer();
    updateEnemies(dt);
    updateBullets();
    updateParticles();
    updateDrops();
    updateFloats();
    drawDrops();
    for(const e of enemies) drawEnemy(e);
    drawBullets();
    drawPlayer();
    drawParticles();
    drawFloats();
    drawHUD();

    if(player.dead) { gameState='gameover'; }
    else if(enemies.length===0) {
      if(currentLevel >= LEVEL_DEFS.length) {
        gameState='win';
        sfxLevel();
      } else {
        gameState='levelclear';
        transitionTimer=TRANSITION_DURATION;
        sfxLevel();
      }
    }
  }
  else if(gameState === 'levelclear') {
    drawBackground();
    updateParticles();
    updateDrops();
    updateFloats();
    drawDrops();
    drawPlayer();
    drawParticles();
    drawFloats();
    drawHUD();
    drawLevelClear();
    transitionTimer--;
    if(transitionTimer <= 0) nextLevel();
  }
  else if(gameState === 'win') {
    drawBackground();
    drawParticles();
    drawHUD();
    drawLevelClear();
    if(keys['r'] || keys['R']) startGame();
  }
  else if(gameState === 'gameover') {
    drawBackground();
    drawParticles();
    drawGameOver();
    if(keys['r'] || keys['R']) startGame();
  }

  ctx.restore();
  mouse.clicked = false;
}

requestAnimationFrame(loop);
</script>
